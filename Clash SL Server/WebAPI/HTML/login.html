<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clash SL</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: #00cc6a;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: white;
        }
        #message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { color: var(--primary); }
        .error { color: #ef4444; }
        #result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--primary);
            text-align: center;
        }
        .code-display {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 3px;
            font-weight: bold;
            margin: 10px 0;
        }
        .cmd-display {
            background: #000;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            color: #fff;
            margin-top: 10px;
            user-select: all;
        }
    </style>
</head>
<body>

<div class="container" id="login-container">
    <h2>Account Login</h2>
    <div id="message"></div>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>
    <button onclick="login()">Login to get Code</button>
    <div class="links">
        <a href="/register">Don't have an account? Register</a>
    </div>

    <div id="result-box">
        <p>Login Successful! Use this command in the game chat to load your village:</p>
        <div class="cmd-display" id="cmd-text">/login 12345 ABCDEF</div>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 15px;">Note: You must be in a clan to use chat commands.</p>
    </div>
</div>

<script>
    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');
        
        msg.style.display = 'block';
        msg.className = '';
        msg.innerText = 'Connecting...';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await response.json();
            
            if(data.success) {
                msg.className = 'success';
                msg.innerText = 'Success!';
                
                // Hide inputs
                document.querySelectorAll('.form-group, button').forEach(el => el.style.display = 'none');
                
                // Show result
                const resBox = document.getElementById('result-box');
                resBox.style.display = 'block';
                document.getElementById('cmd-text').innerText = `/login ${data.player_id} ${data.code}`;
            } else {
                msg.className = 'error';
                msg.innerText = data.error || 'Login failed';
            }
        } catch (e) {
            msg.className = 'error';
            msg.innerText = 'Network error. Please try again.';
        }
    }
</script>
</body>
</html>
