<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Clash SL</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: white;
        }
        #message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { color: #00ff88; }
        .error { color: #ef4444; }
        .help-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <div id="message"></div>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password">
    </div>
    <div class="form-group">
        <label>Player ID</label>
        <input type="number" id="playerid" placeholder="Your in-game Player ID">
        <span class="help-text">You can find this on your profile page in the game.</span>
    </div>
    <div class="form-group">
        <label>Link Code</label>
        <input type="text" id="linkcode" placeholder="8-character Code">
        <span class="help-text">Type /link in the game clan chat to generate this code.</span>
    </div>
    <button onclick="register()">Link & Register</button>
    <div class="links">
        <button onclick="window.location.href='/login.html'">Already have an account? Login</button>
        
        <div style="margin-top: 20px;">
            <p>Need help? <a href="https://discord.gg/pVhKNHsrpT" target="_blank" style="color: #5865F2; font-weight: bold; text-decoration: none;">Contact us on Discord</a></p>
        </div>
    </div>
</div>

<script>
    async function register() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const pid = document.getElementById('playerid').value;
        const code = document.getElementById('linkcode').value;
        const msg = document.getElementById('message');
        
        msg.style.display = 'block';
        msg.className = '';
        msg.innerText = 'Verifying...';

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass, player_id: pid, code: code })
            });
            const data = await response.json();
            
            if(data.success) {
                msg.className = 'success';
                msg.innerText = 'Account successfully linked! Redirecting to login...';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                msg.className = 'error';
                msg.innerText = data.error || 'Registration failed';
            }
        } catch (e) {
            msg.className = 'error';
            msg.innerText = 'Network error. Please try again.';
        }
    }
</script>
</body>
</html>
